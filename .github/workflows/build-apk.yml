name: 构建 APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        run: npm ci

      - name: 构建 Web
        run: npm run build

      - name: 安装 Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 同步 Android
        run: npx cap sync android

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 生成签名密钥
        working-directory: android
        run: |
          keytool -genkey -v \
            -keystore app/jizhang.keystore \
            -alias jizhang \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass jizhang123 \
            -keypass jizhang123 \
            -dname "CN=记一笔, OU=app, O=jiyibi, L=Shenzhen, ST=Guangdong, C=CN"

      - name: 构建 APK (Debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 构建 APK (Release 签名)
        working-directory: android
        run: |
          ./gradlew assembleRelease

      - name: 上传 APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: 记一笔-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: 上传 APK (Release 已签名)
        uses: actions/upload-artifact@v4
        with:
          name: 记一笔-release
          path: android/app/build/outputs/apk/release/app-release.apk
